<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ollama Web UI</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-end; background: #007bff; color: white; }
        .ai { align-self: flex-start; background: #e9e9eb; color: #333; }
        .controls { padding: 20px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div id="chat"></div>

<div class="controls">
    <select id="modelSelect">
        <option value="">Загрузка моделей...</option>
    </select>

    <input type="text" id="userInput" placeholder="Введите ваш вопрос..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">Отправить</button>
</div>

<script>
    const SERVER_IP = '192.168.3.106';
    const BASE_URL = `http://${SERVER_IP}:11434/api`;

    async function loadModels() {
        const select = document.getElementById('modelSelect');
        try {
            const response = await fetch(`${BASE_URL}/tags`);
            const data = await response.json();

            select.innerHTML = ''; // Очищаем заглушку

            if (data.models && data.models.length > 0) {
                data.models.forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.name;
                    option.innerText = model.name;
                    select.appendChild(option);
                });
            } else {
                select.innerHTML = '<option>Модели не найдены</option>';
            }
        } catch (err) {
            console.error('Ошибка загрузки моделей:', err);
            select.innerHTML = '<option>Ошибка связи</option>';
        }
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chat = document.getElementById('chat');
        const btn = document.getElementById('sendBtn');
        const model = document.getElementById('modelSelect').value;
        const text = input.value.trim();

        if (!text || !model) return;

        appendMessage('user', text);
        input.value = '';
        btn.disabled = true;

        const aiMsgDiv = appendMessage('ai', 'Думает...');

        try {
            const response = await fetch(`${BASE_URL}/generate`, {
                method: 'POST',
                body: JSON.stringify({
                    model: model,
                    prompt: text,
                    stream: false
                }),
            });

            const data = await response.json();
            aiMsgDiv.innerText = data.response;
        } catch (err) {
            aiMsgDiv.innerText = 'Ошибка запроса.';
        } finally {
            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const chat = document.getElementById('chat');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}`;
        msgDiv.innerText = text;
        chat.appendChild(msgDiv);
        chat.scrollTop = chat.scrollHeight;
        return msgDiv;
    }

    // Загружаем модели сразу при открытии страницы
    loadModels();
</script>

</body>
</html>
